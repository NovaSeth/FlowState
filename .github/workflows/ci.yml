name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite (DatabaseSync) ships from Node 22.5 but stays behind
        # --experimental-sqlite in the 22 line (unflagged only from the 24 line).
        # The dev toolchain (vitest 4 -> vite 8 / rolldown) also needs >=22.12, so
        # 22.12 is the lowest floor we can install on - test it WITH the flag (via
        # NODE_OPTIONS, inherited by next build + vitest workers), and the current
        # major without it.
        include:
          - node: "22.12.0"
            nodeOptions: "--experimental-sqlite"
          - node: "24.x"
            nodeOptions: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**', 'next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('**/package-lock.json') }}-
      - run: npm run typecheck
      - run: npm run lint
      # Only build + test evaluate node:sqlite, so scope the flag to them - the
      # runner's own node20 (actions/checkout etc.) rejects --experimental-sqlite
      # in NODE_OPTIONS, so it must NOT be set job-wide.
      - run: npm run build
        env:
          NODE_OPTIONS: ${{ matrix.nodeOptions }}
      - run: npm run test
        env:
          NODE_OPTIONS: ${{ matrix.nodeOptions }}
