name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # node:sqlite (DatabaseSync) is available from Node 22.5; test the
        # floor version that ships it plus the current major.
        node: ["22.5.0", "24.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**', 'next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('**/package-lock.json') }}-
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run test
