name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite (DatabaseSync) ships from Node 22.5, but the dev toolchain
        # (vitest 4 -> vite 8 / rolldown) requires >=22.12, so 22.12 is the real
        # floor we can install and test on. Test that floor plus the current major.
        node: ["22.12.0", "24.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**', 'next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node }}-next-${{ hashFiles('**/package-lock.json') }}-
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run test
